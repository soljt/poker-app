services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: poker-backend-dev
    depends_on:
      db:
        condition: service_healthy   # <-- wait for healthy, not just started
    environment:
      - DATABASE_URL=postgresql://pokeruser:pokerpass@db:5432/pokerdb
      - FLASK_ENV=development
      - SECRET_KEY=dev-secret
      - JWT_SECRET_KEY=dev-jwt
      - POKER_BOT_PASSWORD=${POKER_BOT_PASSWORD}
    volumes:
      - ./backend:/app
      - ./recorded_game_data:/app/game_data
    ports:
      - "5000:5000"
    networks:
      - dev_net
    command: ["python", "run.py"]

  frontend:
    build: ./frontend
    container_name: poker-frontend-dev
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.dev.conf:/etc/nginx/conf.d/default.conf
    networks:
      - dev_net

  db:
    image: postgres:17-alpine
    container_name: poker-postgres-dev
    environment:
      POSTGRES_USER: pokeruser
      POSTGRES_PASSWORD: pokerpass
      POSTGRES_DB: pokerdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokeruser -d pokerdb"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 3s   # gives Postgres time before healthchecks begin
    ports:
    - "5432:5432"
    volumes:
      - ./postgres_data_dev:/var/lib/postgresql/data
    networks:
      - dev_net

networks:
  dev_net:
    driver: bridge
