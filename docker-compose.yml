services:
  backend:
    build: ./backend
    container_name: poker-backend
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://pokeruser:pokerpass@db:5432/pokerdb
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - CACHE_REDIS_HOST=redis
      - CACHE_REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./backend:/app
    networks:
      - web
      - backend_net

  frontend:
    build: ./frontend
    container_name: poker-frontend
    # moving to global reverse proxy for VM
    # ports:
    #   - "80:80"
    #   - "443:443"
    depends_on:
      - backend
    volumes: # PRODUCTION ONLY
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
      # we'll terminate ssl at the global reverse proxy
      # - /etc/ssl/poker:/etc/ssl/poker:ro  # Mount certs from host into container (read-only)
    networks:
      - web
      - backend_net

  db:
    image: postgres
    container_name: poker-postgres
    restart: always
    environment:
      POSTGRES_USER: pokeruser
      POSTGRES_PASSWORD: pokerpass
      POSTGRES_DB: pokerdb
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net

  redis:
    image: redis:alpine
    container_name: poker-redis
    ports: []  # No port exposure
    restart: always
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    networks:
      - backend_net

volumes:
  pgdata:

networks:
  web:
    external: true
  
  backend_net:
    driver: bridge